<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quadratic Graph Calculator</title>
  <link rel="stylesheet" href="styles2.css">
</head>
<body>
  <div class="wrap">
    <h1>Quadratic graph</h1>
    <p class="sub">y = ax² + bx + c</p>

    <div class="controls">
      <div class="row">
        <div class="field">
          <label for="a">a &nbsp;(x² coefficient)</label>
          <input type="number" id="a" value="1" step="0.1">
        </div>
        <div class="field">
          <label for="b">b &nbsp;(x coefficient)</label>
          <input type="number" id="b" value="0" step="0.1">
        </div>
        <div class="field">
          <label for="c">c &nbsp;(constant)</label>
          <input type="number" id="c" value="0" step="0.1">
        </div>
      </div>
      <div class="btn-row">
        <button class="primary" onclick="doPlot()">Plot</button>
        <button onclick="resetView()">Reset view</button>
        <button onclick="addPreset()">Try a preset</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-label">Vertex</div><div class="stat-val" id="sv">—</div></div>
      <div class="stat"><div class="stat-label">Roots / x-intercepts</div><div class="stat-val" id="sr">—</div></div>
      <div class="stat"><div class="stat-label">y-intercept</div><div class="stat-val" id="sy">—</div></div>
      <div class="stat"><div class="stat-label">Opens</div><div class="stat-val" id="so">—</div></div>
    </div>

    <canvas id="gc" height="400"></canvas>

    <div class="zoom-row">
      <button onclick="zoom(1.3)">＋ Zoom in</button>
      <button onclick="zoom(0.77)">－ Zoom out</button>
      <span id="zl">Scale: 40px / unit</span>
    </div>
    <p class="hint">Drag to pan · Scroll to zoom</p>
  </div>
  <script src="script2.js"></script>
</body>
</html>
